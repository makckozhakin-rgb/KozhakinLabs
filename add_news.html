{% extends 'newsapp/base.html' %}

{% block title %}Добавить новость{% endblock %}

{% block content %}
<div style="max-width:800px;margin:0 auto;background:white;padding:30px;border-radius:20px;margin-top:30px;">
    <h2>➕ Добавить новость</h2>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <p>
            <label>Заголовок:</label><br>
            {{ form.title }}
        </p>
        <p>
            <label>Содержание:</label><br>
            {{ form.content }}
        </p>
        <p>
            <label>Изображение:</label><br>
            {{ form.image }}
        </p>
        <button type="submit" style="background:#2ecc71;color:white;padding:10px 20px;border:none;border-radius:8px;cursor:pointer;">Сохранить новость</button>
    </form>
</div>
{% endblock %}
