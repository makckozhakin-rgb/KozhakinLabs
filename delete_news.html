{% extends 'newsapp/base.html' %}

{% block title %}Удалить новость{% endblock %}

{% block content %}
<div style="max-width:500px;margin:50px auto;background:white;padding:30px;border-radius:20px;text-align:center;">
    <h2>🗑️ Удалить новость?</h2>
    <p>Вы уверены, что хотите удалить новость <strong>"{{ news.title }}"</strong>?</p>
    <form method="POST">
        {% csrf_token %}
        <button type="submit" style="background:#e74c3c;color:white;padding:10px 20px;border:none;border-radius:8px;cursor:pointer;">Да, удалить</button>
        <a href="{% url 'news_detail' news.id %}" style="background:#95a5a6;color:white;padding:10px 20px;border-radius:8px;text-decoration:none;margin-left:10px;">Отмена</a>
    </form>
</div>
{% endblock %}
